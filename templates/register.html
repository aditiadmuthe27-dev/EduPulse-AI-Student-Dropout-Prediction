<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#064E3B,#059669,#34D399);
}

.auth-container{
    background:#ffffff;
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:430px;
    box-shadow:0 20px 45px rgba(0,0,0,.20);
    border:1px solid #D1FAE5;
}

.auth-container h2{
    text-align:center;
    color:#065F46;
    margin-bottom:8px;
    font-size:30px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#6B7280;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

.form-group input,
.form-group select{
    width:100%;
    padding:13px;
    border:2px solid #D1D5DB;
    border-radius:10px;
}

.form-group input:focus,
.form-group select:focus{
    outline:none;
    border-color:#10B981;
    box-shadow:0 0 10px rgba(16,185,129,.25);
}

.btn-primary{
    width:100%;
    padding:14px;
    background:linear-gradient(90deg,#059669,#10B981);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.btn-primary:hover{
    box-shadow:0 10px 20px rgba(16,185,129,.35);
}

.text-center{
    text-align:center;
    margin-top:18px;
}

.text-center a{
    color:#059669;
    text-decoration:none;
    font-weight:600;
}

.text-center a:hover{
    text-decoration:underline;
}

.flashes{
    list-style:none;
    margin-bottom:20px;
}

.flash{
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    text-align:center;
}

.flash.success{
    background:#DCFCE7;
    color:#166534;
}

.flash.danger{
    background:#FEE2E2;
    color:#B91C1C;
}
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>EduPulse Register</h2>
        <p class="subtitle">Create your EduPulse account</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flashes">
            {% for category, message in messages %}
              <li class="flash {{ category }}">{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="Student">Student</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Register</button>
        </form>
        <div class="text-center">
            <a href="{{ url_for('login') }}">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
