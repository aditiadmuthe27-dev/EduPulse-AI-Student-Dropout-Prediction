<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduPulse | Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Outfit',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0F172A,#1E3A8A,#2563EB);
        }

        .auth-container{
            width:420px;
            background:#ffffff;
            padding:45px;
            border-radius:22px;
            box-shadow:0 20px 45px rgba(0,0,0,.20);
        }

        h2{
            text-align:center;
            color:#1E3A8A;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#6B7280;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        input{
            width:100%;
            padding:14px;
            border:2px solid #D1D5DB;
            border-radius:12px;
        }

        input:focus{
            outline:none;
            border-color:#2563EB;
        }

        .btn-primary{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#2563EB;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .btn-primary:hover{
            background:#1D4ED8;
        }

    </style>

</head>

<body>

<div class="auth-container">

    <h2>EduPulse Login</h2>

    <p>Welcome Back! Please login to continue.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul style="list-style:none; margin-bottom:20px;">
                {% for category, message in messages %}
                    <li style="padding:12px; border-radius:10px; margin-bottom:10px; background:#DCFCE7; color:#166534; text-align:center;">
                        {{ message }}
                    </li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">

        <div class="form-group">
            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >
        </div>

        <button
            type="submit"
            class="btn-primary">
            Login
        </button>

    </form>
        <div class="text-center" style="margin-top:20px; text-align:center;">

        <a
            href="{{ url_for('register') }}"
            style="text-decoration:none; color:#2563EB; font-weight:600;"
        >
            Don't have an account? Register
        </a>

    </div>

</div>

</body>

</html>
