{% extends "base.html" %}

{% block title %}Add Student{% endblock %}

{% block content %}

<div class="dashboard-container">

    <div class="panel-header">
        <h2>➕ Add New Student</h2>
    </div>

    <div class="main-panel">

        <form action="/add_student" method="POST">

            <div style="margin-bottom:20px;">
                <label><b>Student Name</b></label><br><br>

                <input type="text" name="name" placeholder="Enter Student Name" required
                    style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">
            </div>

            <div style="margin-bottom:20px;">
                <label><b>GPA</b></label><br><br>

                <input type="number" step="0.01" name="gpa" placeholder="Example: 8.5" required
                    style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">
            </div>

            <div style="margin-bottom:20px;">
                <label><b>Attendance (%)</b></label><br><br>

                <input type="number" step="0.01" name="attendance" placeholder="Example: 90" required
                    style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">
            </div>

            <div style="margin-bottom:20px;">
                <label><b>Assignments Completed</b></label><br><br>

                <input type="number" name="assignments_completed" placeholder="Example: 12" required
                    style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;">
            </div>

            <button type="submit"
                style="background:#4f46e5;color:white;padding:12px 25px;border:none;border-radius:8px;font-size:16px;cursor:pointer;">

                💾 Save Student

            </button>

            <a href="/students" style="margin-left:15px;text-decoration:none;font-weight:bold;">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
